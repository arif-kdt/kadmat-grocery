{% extends 'base.html' %}
{% block title %}Login — Kadmat Grocery{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4">
            <div class="text-center mb-4">
                <i class="bi bi-basket2-fill text-success" style="font-size: 3rem;"></i>
                <h4 class="mt-2 fw-bold">Welcome Back</h4>
                <p class="text-muted">Kadmat Island Grocery</p>
            </div>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
            </form>
            <hr>
            <div class="text-center">
                <p class="mb-1">Don't have an account?</p>
                <a href="/register/customer/" class="btn btn-outline-success btn-sm me-2">Register as Customer</a>
                <a href="/register/seller/" class="btn btn-outline-secondary btn-sm">Register as Seller</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
